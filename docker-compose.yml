# One-click deploy: PostgreSQL + API + Web (nginx)
# Usage: copy .env.example to .env, then: docker compose up -d --build

services:
  postgres:
    # 轩辕等镜像站请用完整路径，见 .env.example（勿仅用 postgres:16-alpine + 镜像加速）
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contract_info_dev}
      POSTGRES_DB: contract_info
    volumes:
      - contract_info_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contract_info"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ctrx

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim-bookworm}
        # PyPI 源写在 Dockerfile 内；勿在 .env 设空的 PIP_TRUSTED_HOST= 以免覆盖默认值
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-contract_info_dev}@postgres:5432/contract_info
    volumes:
      - contract_info_uploads:/app/uploads
      - contract_info_exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s
    networks:
      - ctrx

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${API_KEY:-}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ctrx

volumes:
  contract_info_pg_data:
  contract_info_uploads:
  contract_info_exports:

networks:
  ctrx:
    driver: bridge
