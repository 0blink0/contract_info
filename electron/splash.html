<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:" />
    <title>CTRX</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #3b82f6;
        --primary-dark: #2563eb;
        --aside-top: #1e293b;
        --aside-bottom: #0f172a;
        --radius: 16px;
        --shadow: 0 24px 48px rgba(15, 23, 42, 0.08), 0 4px 12px rgba(15, 23, 42, 0.04);
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          'Segoe UI',
          'Helvetica Neue',
          Helvetica,
          'PingFang SC',
          'Microsoft YaHei',
          sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59, 130, 246, 0.14), transparent 55%),
          radial-gradient(ellipse 50% 40% at 100% 100%, rgba(30, 41, 59, 0.06), transparent 50%),
          var(--bg);
      }

      .grid {
        position: fixed;
        inset: 0;
        opacity: 0.35;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 75%);
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }

      .card {
        width: min(420px, 100%);
        padding: 40px 36px 36px;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid rgba(226, 232, 240, 0.9);
        text-align: center;
        animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 18px;
        background: linear-gradient(145deg, var(--aside-top) 0%, var(--aside-bottom) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.22);
      }

      .mark svg {
        width: 36px;
        height: 36px;
        color: #e2e8f0;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--text);
        margin-bottom: 6px;
      }

      .tagline {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 28px;
        line-height: 1.5;
      }

      .progress-track {
        height: 4px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .progress-bar {
        height: 100%;
        width: 36%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        animation: slide 1.8s ease-in-out infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(180%);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      .status {
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 8px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .dots {
        display: inline-flex;
        gap: 4px;
        margin-left: 2px;
        vertical-align: baseline;
      }

      .dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--primary);
        opacity: 0.35;
        animation: blink 1.2s ease-in-out infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: translateY(0);
        }
        40% {
          opacity: 1;
          transform: translateY(-2px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .card,
        .progress-bar,
        .dots span {
          animation: none;
        }

        .progress-bar {
          width: 55%;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>
    <main class="shell">
      <div class="card" role="status" aria-live="polite" aria-busy="true">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="8" y1="13" x2="16" y2="13" />
            <line x1="8" y1="17" x2="13" y2="17" />
          </svg>
        </div>
        <h1>CTRX</h1>
        <p class="tagline">私募基金合同要素抽取</p>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar"></div>
        </div>
        <p class="status">
          正在启动本地服务
          <span class="dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </p>
        <p class="hint">首次启动需加载数据库与解析引擎，请稍候</p>
      </div>
    </main>
  </body>
</html>
